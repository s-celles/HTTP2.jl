name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        julia-version:
          - '1.10'
          - '1'
        os:
          - ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

  interop:
    name: Interop (libnghttp2 cross-tests)
    runs-on: ubuntu-latest
    # Nghttp2Wrapper.jl requires Julia 1.12+, so this job runs on the
    # current stable release only and is NOT matrixed across the
    # main test-job's [1.10, 1] range.
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Instantiate interop env
        run: |
          julia --project=test/interop -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.add(PackageSpec(
                url="https://github.com/s-celles/Nghttp2Wrapper.jl",
                rev="a3dbdfb548c3d4bfbf4ddfce2a835a990f19dcc2"))
            Pkg.instantiate()'
      - name: Run interop cross-tests
        run: julia --project=test/interop test/interop/runtests.jl
